<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Personal AI Agent</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="jarvis-icon">
                    <div class="arc arc-1"></div>
                    <div class="arc arc-2"></div>
                    <div class="arc arc-3"></div>
                    <div class="core"></div>
                </div>
                <h1>JARVIS</h1>
            </div>
            <div class="status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Online</span>
            </div>
        </header>

        <!-- Main Chat Area -->
        <main class="chat-container">
            <div class="messages" id="messages">
                <!-- Welcome message -->
                <div class="message bot">
                    <div class="avatar">
                        <div class="avatar-inner">J</div>
                    </div>
                    <div class="content">
                        <p>Good evening, Akshay. I'm online and ready.</p>
                        <p>What would you like me to do?</p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <button class="voice-btn" id="voiceBtn" title="Hold to speak">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
                        <path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
                <input type="text" id="messageInput" placeholder="Type your command..." autocomplete="off">
                <button class="send-btn" id="sendBtn">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </main>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <h3>System Status</h3>
                <div class="status-item">
                    <span>CPU</span>
                    <div class="progress">
                        <div class="progress-bar" id="cpuBar" style="width: 0%"></div>
                    </div>
                </div>
                <div class="status-item">
                    <span>RAM</span>
                    <div class="progress">
                        <div class="progress-bar" id="ramBar" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="sidebar-section">
                <h3>Quick Actions</h3>
                <button class="quick-action" onclick="quickAction('screenshot')">📸 Screenshot</button>
                <button class="quick-action" onclick="quickAction('focus')">🎯 Focus Mode</button>
                <button class="quick-action" onclick="quickAction('crypto')">₿ Cardano Price</button>
                <button class="quick-action" onclick="quickAction('search')">🔍 Quick Search</button>
            </div>

            <div class="sidebar-section">
                <h3>Active Projects</h3>
                <div class="project-list" id="projectList">
                    <div class="project">VORAX</div>
                    <div class="project">Rashi IDE</div>
                    <div class="project">MarketX Vault</div>
                </div>
            </div>
        </aside>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script src="/static/jarvis.js"></script>
</body>
</html>
